name: "Node.js SDK CI"

on:
  push:
    branches: [main]
    paths: ["node/**"]
  pull_request:
    branches: [main]
    paths: ["node/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
